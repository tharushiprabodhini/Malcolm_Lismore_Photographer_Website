  <link rel="stylesheet" href="css/style.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <script src="js/booking.js" defer></script>
</head>
<body>
  <header>
    <!-- Navigation Bar -->
    <div class="navigation">
      <div class="navigation-items">
        <a href="index.html" class="logo-link">
          <img src="images/Logo.png" alt="Logo" class="logo">
        </a>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about page.html">About</a></li>

          <li><a href="prices page.html">Prices</a></li>
          <li><a href="booking page.html" class="active">Booking</a></li>
        </ul>
        <a href="contact page.html" class="contact-button">Contact Us</a>
      </div>
    </div>
  </header>
  <div id="toast" class="toast"></div>

  <div class="wedding-section">
    <p class="section-subtitle">Meeting Request Form</p>
    <h2 class="section-title">We Look Forward to Meeting with You</h2>
  </div>

  <div class="book">
    <form action="booking.php" method="POST" class="bookingForm" id="bookingForm">
      <label for="name">Full Name *</label>
      <input type="text" name="Full_name" id="name" placeholder="Enter your full name" required>

      <label for="email">Email *</label>
      <input type="email" name="email" id="email" placeholder="Enter your email" required>

      <label for="locationa">Location *</label>
      <input type="text" name="locationa" id="locationa" placeholder="Enter your location" required>

      <label for="phone_number">Phone Number *</label>
      <input type="tel" name="phone_number" id="phone_number" placeholder="Enter your phone number" required>

      <label for="photography_type">Select Photography Category *</label>
      <select id="photography_type" name="photography_type" required>
        <option value="">Select photography category</option>
        <option value="wedding">Wedding Photography</option>
        <option value="portrait">Portrait Photography</option>
        <option value="special_events">Special Events Photography</option>
        <option value="landscape">Landscape Photography</option>
        <option value="additional">Additional Photography</option>
        <option value="wildlife">Wildlife Photography</option>
      </select>

      <label for="photography_package">Select Photography Package *</label>
      <select id="photography_package" name="photography_package" required>
        <option value="">Select photography package</option>
        <option value="basic">Basic</option>
        <option value="standard">Standard</option>
        <option value="premium">Premium</option>
      </select>

      <label for="additional_package">Additional Photography Type (Optional)</label>
      <select id="additional_package" name="additional_package">
        <option value="">Select additional photography type</option>
        <option value="baby_kids">Baby/Kids - $40.15</option>
        <option value="graduation">Graduation Shoots - $33.45</option>
        <option value="couple_pre_shoot">Couple/Pre-Shoot - $66.91</option>
      </select>

      <label for="additional_message">Message (Optional)</label>
      <textarea id="additional_message" name="additional_message" placeholder="Tell us any questions"></textarea>

      <button type="submit">Submit</button>
      <p class="successMessage">Submitted your Request!</p>
    </form>
  </div>

  <footer>
    <div class="footer-content">
      <p><a href="contact page.html">Contact Us</a> | <a href="privacy.html">Privacy Policy</a></p>
      <p>© 2025 Malcolm Lismore Photography. All rights reserved. |
        <i>Developed by Tharushi Prabodhini</i>
      </p>
    </div>
  </footer>
</body>
</html>
