</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <nav class="navigation">
      <div class="navigation-items">
        <a href="index page.html" class="logo-link">
          <img src="images/Logo.png" alt="Logo" class="logo" />
        </a>
        <ul>
          <li><a href="index page.html">Home</a></li>
          <li><a href="about page.html">About</a></li>

      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Register Form -->
    <div class="book">
      <h2 style="margin-bottom: 25px;">Create Account</h2>
      <form class="bookingForm" method="POST" action="register.php">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password *</label>
        <input type="password" id="password" name="password" required>

        <label for="confirm_password">Confirm Password *</label>
        <input type="password" id="confirm_password" name="confirm_password" required>

        <button type="submit">Register</button>
      </form>
      <p style="margin-top: 20px;">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Footer -->
